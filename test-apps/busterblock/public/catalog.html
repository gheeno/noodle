<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VHS Catalog — BusterBlock.ca</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    /* SVG half-star gradient, injected once */
    svg.star.half polygon { fill: url(#half-star-grad); }
  </style>
</head>
<body data-page="catalog">

<!-- Half-star gradient def — referenced by starsHTML() in app.js -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="half-star-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="50%" stop-color="#ffaa00"/>
      <stop offset="50%" stop-color="transparent"/>
    </linearGradient>
  </defs>
</svg>

<div class="page-wrap">

  <nav class="site-nav" role="navigation" aria-label="Main navigation">
    <div class="nav-inner">
      <a href="/catalog.html" class="nav-brand" aria-label="BusterBlock home">
        <!-- Inline mini VHS logo -->
        <svg class="vhs-logo-svg" viewBox="0 0 80 54" aria-hidden="true">
          <rect x="2" y="5" width="76" height="44" rx="6" fill="#0e0e1c" stroke="#00e87a" stroke-width="1.2"/>
          <rect x="8" y="10" width="64" height="20" rx="3" fill="#08080f"/>
          <text x="40" y="23" text-anchor="middle" fill="#00e87a" font-size="7" font-family="monospace" font-weight="700" letter-spacing="1.5">BUSTERBLOCK</text>
          <g transform="translate(26,38)">
            <circle r="8" fill="#08080f" stroke="#1e1e42" stroke-width="1" class="vhs-reel-left"/>
            <circle r="3.5" fill="#00e87a" opacity=".7" class="vhs-reel-left"/>
          </g>
          <g transform="translate(54,38)">
            <circle r="8" fill="#08080f" stroke="#1e1e42" stroke-width="1" class="vhs-reel-right"/>
            <circle r="3.5" fill="#00e87a" opacity=".7" class="vhs-reel-right"/>
          </g>
          <path d="M18 38 Q26 34 34 38 Q40 41 46 38 Q54 34 62 38" stroke="#ffaa00" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        </svg>
        BusterBlock<span class="brand-tag">.ca</span>
      </a>

      <ul class="nav-links" role="list">
        <li><a href="/catalog.html" class="active" aria-current="page">Catalog</a></li>
        <li>
          <a href="/cart.html" class="cart-link" aria-label="View cart">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            Cart
            <span class="cart-badge hidden" data-cart-count aria-label="items in cart">0</span>
          </a>
        </li>
        <li><span class="nav-user" id="nav-username"></span></li>
        <li><button class="nav-btn-ghost" id="logout-btn" aria-label="Log out">Logout</button></li>
      </ul>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h1>
        VHS Catalog
        <span class="count-tag" id="movie-count">—</span>
      </h1>
      <p>Browse our collection of classic VHS rentals. <span class="text-amber">Be kind, rewind.</span></p>
    </div>

    <!-- Search + filter row -->
    <div class="filter-row">
      <input
        type="search"
        id="search-input"
        class="form-control search-input"
        placeholder="Search titles, directors, cast…"
        aria-label="Search movies"
      >
      <select id="genre-filter" class="select-control" aria-label="Filter by genre">
        <option value="">All Genres</option>
      </select>
    </div>

    <!-- Scrollable table — horizontal + vertical scroll, sticky header, sticky first col -->
    <div class="table-wrap" role="region" aria-label="VHS movie catalog" tabindex="0">
      <table class="data-table" id="movies-table" aria-label="Movie catalog table">
        <thead>
          <tr>
            <th scope="col">Title</th>
            <th scope="col">Year</th>
            <th scope="col">Genre</th>
            <th scope="col">Director</th>
            <th scope="col">Cast</th>
            <th scope="col">Runtime</th>
            <th scope="col">Format</th>
            <th scope="col">Stock</th>
            <th scope="col">Price</th>
            <th scope="col">Rating</th>
            <th scope="col">Actions</th>
          </tr>
        </thead>
        <tbody id="movies-tbody" aria-live="polite">
          <tr><td colspan="11" style="text-align:center;padding:2rem;color:var(--text-muted);">Loading catalog…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <footer class="site-footer">
    <span>BusterBlock.ca</span> — Established 1985 · Be kind, rewind · &copy; 2025
  </footer>

</div>

<script src="/assets/app.js"></script>
</body>
</html>
