# Page object — hovers. All three avatar <img> tags share the identical
# alt="User Avatar" — nth-of-type overrides disambiguate which one to hover.

user 1 avatar:
  css: ".figure:nth-of-type(1) img"
user 2 avatar:
  css: ".figure:nth-of-type(2) img"
user 3 avatar:
  css: ".figure:nth-of-type(3) img"
